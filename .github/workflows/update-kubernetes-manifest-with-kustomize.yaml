name: Update Kubernetes Manifest With Kustomize

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      application:
        required: true
        type: string
      version:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source codee
        uses: actions/checkout@v3
      - name: update kubernetes manifest
        run: |
          #!/bin/sh

          set -e

          if ! command -v kustomize &> /dev/null
          then
              curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          fi

          APP_DIR="${{ inputs.application }}/overlay/${{ inputs.environment }}"

          if [ ! -d $APP_DIR ]
          then
            echo "directory dose not existing"
            exit 1
          fi

          cd $APP_DIR
          kustomize edit set image ${{ inputs.registry }}/${{ inputs.application }}:${{ inputs.version }}
          kustomize build

