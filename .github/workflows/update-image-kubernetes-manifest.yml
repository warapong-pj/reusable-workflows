name: Update Image Kubernetes Manifest

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      application:
        required: true
        type: string
      version:
        required: true
        type: string
      environment:
        required: true
        type: string


jobs:
  update-image-kubernetes-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source code
        uses: actions/checkout@v3
      - name: update container image by kustomize
        run: |
          #!/bin/sh

          set -xe

          if ! command -v kustomize &> /dev/null
          then
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
              exit
          fi

          APP_DIR="${{ inputs.application }}/overlay/${{ inputs.environment }}"

          if [ ! -d $APP_DIR ]
          then
            echo "directory dose not existing"
            exit 1
          fi

          cd $APP_DIR
          kustomize edit set image ${{ inputs.registry }}/${{ inputs.application }}:${{ inputs.version }}
          kustomize build

          cd -
          git config --global user.email "warapong.pj@gmail.com"
          git config --global user.name "warapong-pj"
          git add $APP_DIR
          git commit -m "ci: update ${{ inputs.application }} image tag ${{ inputs.version }} on ${{ inputs.environment }} environment"
          git push origin ${{ github.ref_name }}
